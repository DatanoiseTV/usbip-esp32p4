<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USB/IP Server - Settings</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>Settings</h1>
            <div class="subtitle">USB/IP Server Configuration</div>
        </div>
        <div class="header-right"></div>
    </div>

    <div class="main">
        <a href="/" class="back-link">&larr; Back to Dashboard</a>

        <!-- Network section -->
        <div class="panel">
            <div class="panel-header">Network</div>
            <div class="panel-body">
                <div class="settings-section">
                    <div class="form-group">
                        <label for="hostname">Hostname</label>
                        <input type="text" id="hostname" value="" placeholder="usbip-esp32p4">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="dhcp-enabled" checked>
                            Use DHCP
                        </label>
                    </div>
                    <div class="form-group">
                        <label for="static-ip">Static IP</label>
                        <input type="text" id="static-ip" value="" placeholder="192.168.1.100" disabled>
                    </div>
                </div>
            </div>
        </div>

        <!-- Access Control section -->
        <div class="panel">
            <div class="panel-header">Access Control</div>
            <div class="panel-body">
                <div class="settings-section">
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="closed-mode">
                            Closed Mode (only allow listed IPs)
                        </label>
                    </div>
                    <div class="form-group">
                        <label>IP Allowlist</label>
                        <div class="allowlist-editor" id="allowlist">
                            <div class="empty-state">No IPs in allowlist</div>
                        </div>
                        <div class="add-ip-row">
                            <input type="text" id="new-ip" placeholder="192.168.1.10">
                            <button class="btn btn-secondary" onclick="addIP()">Add</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- System section -->
        <div class="panel">
            <div class="panel-header">System</div>
            <div class="panel-body">
                <div class="settings-section">
                    <div class="info-row">
                        <span class="info-label">Firmware</span>
                        <span class="info-value" id="fw-version">USB/IP Server v1.0</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">IDF Version</span>
                        <span class="info-value" id="idf-version">--</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Free Heap</span>
                        <span class="info-value" id="free-heap">--</span>
                    </div>
                    <br>
                    <button class="btn btn-danger" onclick="doRestart()">Restart Device</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var dhcpCb = document.getElementById('dhcp-enabled');
        var staticIp = document.getElementById('static-ip');

        dhcpCb.addEventListener('change', function() {
            staticIp.disabled = dhcpCb.checked;
        });

        // Fetch current stats for system info
        fetch('/api/stats')
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.free_heap) {
                    document.getElementById('free-heap').textContent =
                        (d.free_heap / 1024).toFixed(0) + ' KB';
                }
                if (d.idf_version) {
                    document.getElementById('idf-version').textContent = d.idf_version;
                }
            })
            .catch(function() {});
    })();

    function doRestart() {
        if (confirm('Restart the device?')) {
            fetch('/api/restart', { method: 'POST' })
                .then(function() {
                    document.body.innerHTML = '<div class="main"><div class="panel"><div class="panel-body"><div class="empty-state">Restarting...</div></div></div></div>';
                })
                .catch(function() {});
        }
    }

    function addIP() {
        var input = document.getElementById('new-ip');
        var ip = input.value.trim();
        if (!ip) return;
        // For now just show in UI; real implementation would POST to API
        var el = document.getElementById('allowlist');
        if (el.querySelector('.empty-state')) el.innerHTML = '';
        var div = document.createElement('div');
        div.className = 'allowlist-item';
        div.innerHTML = '<span class="ip">' + ip + '</span> <button onclick="this.parentElement.remove()">&times;</button>';
        el.appendChild(div);
        input.value = '';
    }
    </script>
</body>
</html>
